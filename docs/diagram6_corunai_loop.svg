<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Arial, Helvetica, sans-serif" font-size="13">
  <defs>
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="#ffffff"/>

  <!-- ============ Title ============ -->
  <text x="600" y="30" text-anchor="middle" font-size="16" font-weight="bold">corun-ai research loop</text>
  <text x="600" y="50" text-anchor="middle" font-size="11" font-style="italic" fill="#555">an orchestrated research system with config-compare threading</text>

  <!-- ============ Participant headers ============ -->
  <rect x="50" y="70" width="140" height="50" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="120" y="94" text-anchor="middle" font-weight="bold">Expert</text>
  <text x="120" y="110" text-anchor="middle" font-weight="bold">evaluator</text>

  <rect x="270" y="70" width="140" height="50" rx="6" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="340" y="100" text-anchor="middle" font-weight="bold">Scheduler</text>

  <rect x="490" y="70" width="140" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="94" text-anchor="middle" font-weight="bold">Worker LLM</text>
  <text x="560" y="110" text-anchor="middle" font-size="10" font-style="italic" fill="#0d47a1">frontier · open source</text>

  <rect x="710" y="70" width="140" height="50" rx="6" fill="#f1f8e9" stroke="#33691e" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="780" y="100" text-anchor="middle" font-weight="bold">MCP tools</text>

  <rect x="930" y="70" width="140" height="50" rx="6" fill="#ffffff" stroke="#555" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1000" y="94" text-anchor="middle" font-weight="bold">Research</text>
  <text x="1000" y="110" text-anchor="middle" font-weight="bold">entry</text>

  <!-- ============ Lifelines ============ -->
  <line x1="120" y1="125" x2="120" y2="705" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="340" y1="125" x2="340" y2="705" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="560" y1="125" x2="560" y2="705" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="780" y1="125" x2="780" y2="705" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="1000" y1="125" x2="1000" y2="705" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- ============ Message 1: U -> S ============ -->
  <circle cx="108" cy="150" r="10" fill="#333"/>
  <text x="108" y="154" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <text x="230" y="143" text-anchor="middle" font-size="12">submit research prompt</text>
  <text x="230" y="157" text-anchor="middle" font-size="11" fill="#555" font-style="italic">+ config (model · sysprompt · MCP set)</text>
  <line x1="123" y1="165" x2="337" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- ============ Message 2: S -> W ============ -->
  <circle cx="328" cy="190" r="10" fill="#333"/>
  <text x="328" y="194" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <text x="450" y="183" text-anchor="middle" font-size="12">spawn worker with config</text>
  <line x1="343" y1="205" x2="557" y2="205" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- ============ Loop box ============ -->
  <rect x="505" y="225" width="325" height="220" rx="6" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="505" y="225" width="90" height="22" fill="#1565c0"/>
  <text x="550" y="241" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">loop</text>
  <text x="667" y="241" text-anchor="middle" font-size="11" fill="#0d47a1" font-style="italic">deep analysis — minutes to tens of minutes</text>

  <!-- Message 3: W -> M -->
  <circle cx="548" cy="275" r="10" fill="#333"/>
  <text x="548" y="279" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
  <text x="670" y="268" text-anchor="middle" font-size="12">tool call</text>
  <text x="670" y="282" text-anchor="middle" font-size="11" fill="#555" font-style="italic">PanDA / LXR / Rucio / …</text>
  <line x1="563" y1="290" x2="777" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- Message 4: M -> W (dashed return) -->
  <circle cx="768" cy="320" r="10" fill="#333"/>
  <text x="768" y="324" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <text x="670" y="314" text-anchor="middle" font-size="12">results</text>
  <line x1="777" y1="335" x2="563" y2="335" stroke="#666" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>

  <!-- Message 5: W -> W self-loop -->
  <circle cx="548" cy="375" r="10" fill="#333"/>
  <text x="548" y="379" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <text x="625" y="375" font-size="12">reason · refine · iterate</text>
  <path d="M 563,390 L 625,390 L 625,415 L 563,415" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- ============ Message 6: W -> S (dashed return) ============ -->
  <circle cx="548" cy="475" r="10" fill="#333"/>
  <text x="548" y="479" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
  <text x="450" y="470" text-anchor="middle" font-size="12">completed analysis</text>
  <line x1="557" y1="490" x2="343" y2="490" stroke="#666" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>

  <!-- ============ Message 7: S -> E ============ -->
  <circle cx="328" cy="515" r="10" fill="#333"/>
  <text x="328" y="519" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">7</text>
  <text x="670" y="510" text-anchor="middle" font-size="12">write research entry</text>
  <line x1="343" y1="530" x2="997" y2="530" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- ============ Message 8: E -> U (dashed return) ============ -->
  <circle cx="988" cy="555" r="10" fill="#333"/>
  <text x="988" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">8</text>
  <text x="560" y="550" text-anchor="middle" font-size="12">notify + surface result</text>
  <line x1="997" y1="570" x2="123" y2="570" stroke="#666" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow-dashed)"/>

  <!-- ============ Message 9: U -> E ============ -->
  <circle cx="108" cy="595" r="10" fill="#333"/>
  <text x="108" y="599" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">9</text>
  <text x="560" y="590" text-anchor="middle" font-size="12">annotate · thread comments</text>
  <line x1="123" y1="610" x2="997" y2="610" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>

  <!-- ============ Note over U .. E ============ -->
  <rect x="60" y="635" width="1080" height="82" rx="4" fill="#fffde7" stroke="#f9a825" stroke-width="1.2"/>
  <text x="600" y="657" text-anchor="middle" font-size="12" font-style="italic" fill="#5d4037">
    config variants (model · sysprompt · MCP set) compared side-by-side in annotation threads —
  </text>
  <text x="600" y="678" text-anchor="middle" font-size="12" font-style="italic" fill="#5d4037">
    an R&amp;D testbed measuring LLM configuration performance while addressing
  </text>
  <text x="600" y="699" text-anchor="middle" font-size="12" font-style="italic" fill="#5d4037">
    real, complex production and software documentation questions
  </text>

  <!-- ============ Footer legend ============ -->
  <text x="600" y="745" text-anchor="middle" font-size="11" fill="#666">
    solid arrow = call &#160;·&#160; dashed arrow = return &#160;·&#160; boxed section = loop
  </text>
  <text x="600" y="765" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    per-study latency spans minutes to tens of minutes; long-latency by design
  </text>
</svg>
