# =============================================================================
# Docker Compose for swf-monitor
# =============================================================================
# Starts the Django application together with the infrastructure it needs:
#   - PostgreSQL 16  (primary database)
#   - Redis 7        (Django Channels layer for SSE relay)
#   - ActiveMQ Artemis (message broker — optional but included for completeness)
#
# Usage:
#   cp ../swf-monitor/.env.example ../swf-monitor/.env   # then edit ../swf-monitor/.env (at minimum set SECRET_KEY)
#   docker compose up -d --build
#   docker compose logs -f web
# =============================================================================

networks:
  swf-network:
    driver: bridge

services:
  # ---------- infrastructure --------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-swfdb}
      POSTGRES_USER:     ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_db_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - swf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d swfdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - swf-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-artemis:latest-alpine
    restart: unless-stopped
    ports:
      - "8161:8161"    # Web console (admin/admin)
      - "61616:61616"  # Core protocol
      - "61613:61613"  # STOMP
    environment:
      ARTEMIS_USER:     admin
      ARTEMIS_PASSWORD: admin
    volumes:
      - amqdata:/var/lib/artemis-instance
    networks:
      - swf-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8161/console/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------- application -----------------------------------------------------
  web:
    build:
      context: ../swf-monitor/
      dockerfile: ../swf-monitor/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../swf-monitor/.env
    environment:
      # Override connection hosts to point at Docker service names.
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME:-swfdb}
      DB_USER:     ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-your_db_password}
      REDIS_URL:   redis://redis:6379/0
      ACTIVEMQ_HOST: activemq
      ACTIVEMQ_PORT: "61613"
      # Django superuser (created automatically on first start)
      DJANGO_SUPERUSER_USERNAME:  ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL:     ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD:  ${DJANGO_SUPERUSER_PASSWORD:-changeme}
    networks:
      - swf-network

volumes:
  pgdata:
  redisdata:
  amqdata:
