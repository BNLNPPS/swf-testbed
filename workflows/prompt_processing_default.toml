[testbed]
namespace = "test-user"

[workflow]
name = "prompt_processing"
version = "1.0"
description = "Prompt processing of STF files"
includes = ["daq_state_machine.toml"]

# =============================================================================
# Agent Configuration
# =============================================================================
[agents.stf-data]
enabled = true
script = "agents/data_agent.py"

[agents.stf-processing]
enabled = true
script = "agents/prompt_processing_agent.py"

# =============================================================================
# Prompt Processing Parameters (used by prompt_processing.py)
# =============================================================================
[simulation]
# STF generation parameters
stf_count = 10                  # Number of STF files to generate
physics_period_count = 1        # Number of physics periods

# Timing parameters
realtime = true                 # Run in real-time (1 sim second = 1 wall second)

[prompt_processing]
# Optional shared output root for generated STF files and data-agent dataset uploads.
# Leave empty in the shared config. Users can override via:
# 1. SWF_TESTBED_CONFIG with [prompt_processing].container
# 2. SWF_PROMPT_PROCESSING_CONTAINER=/data/<user>/<folder>
# If neither is set, both components fall back to /tmp.
container = ""
